<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 16px;
        }

        .breadcrumb {
            text-align: center;
            margin-bottom: 30px;
        }

        .breadcrumb a {
            color: #60a5fa;
            text-decoration: none;
            margin: 0 5px;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .input-section {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .input-section:hover {
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.5);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .char-count {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            text-align: right;
        }

        .btn-analyze {
            width: 100%;
            padding: 14px 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-analyze:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .result-section.loaded {
            justify-content: flex-start;
            text-align: left;
        }

        .empty-state {
            color: #94a3b8;
            font-size: 16px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .result {
            width: 100%;
        }

        .result-header {
            margin-bottom: 30px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 10px;
        }

        .original-comment {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid rgba(96, 165, 250, 0.5);
            color: #cbd5e1;
            line-height: 1.6;
            word-break: break-word;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .result-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .result-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .result-category {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-green {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-yellow {
            background: rgba(234, 179, 8, 0.2);
            color: #fcd34d;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .badge-orange {
            background: rgba(249, 115, 22, 0.2);
            color: #fdba74;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .status-badge {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-top: 8px;
        }

        .status-toxic {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-safe {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s ease;
        }

        .result-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.3);
            flex: 1;
            text-align: center;
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.2);
            border-color: rgba(148, 163, 184, 0.5);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(148, 163, 184, 0.2);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .result-footer {
                flex-direction: column;
            }

            .btn-secondary {
                flex: none;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Comment Analyzer</h1>
            <p class="subtitle">Analyze and classify comments for toxicity</p>
        </header>

        <div class="breadcrumb">
            <a href="/">← Dashboard</a>
        </div>

        <div class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <form id="analyzer-form">
                    <div class="form-group">
                        <label for="comment-input">Enter Comment to Analyze</label>
                        <textarea 
                            id="comment-input" 
                            placeholder="Paste the comment you want to analyze here..."
                            maxlength="2000"
                        ></textarea>
                        <div class="char-count">
                            <span id="char-count">0</span> / 2000
                        </div>
                    </div>
                    <button type="submit" class="btn-analyze">Analyze Comment</button>
                </form>
            </div>

            <!-- Result Section -->
            <div class="result-section" id="result-section">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <p>Enter a comment and click "Analyze" to see results</p>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing comment...</p>
                </div>

                <div class="result" id="result" style="display: none;">
                    <div class="result-header">
                        <div class="result-title">Analysis Result</div>
                        <div class="original-comment" id="result-original"></div>
                    </div>

                    <div class="result-grid">
                        <div class="result-item">
                            <div class="result-label">Category</div>
                            <div class="result-category" id="result-category"></div>
                            <div id="result-badge"></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Status</div>
                            <div id="result-status"></div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Toxicity Score</div>
                            <div class="result-value" id="result-toxicity">0%</div>
                            <div class="confidence-bar">
                                <div class="confidence-fill" id="toxicity-bar" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">Confidence</div>
                            <div class="result-value" id="result-confidence">0%</div>
                            <div class="confidence-bar">
                                <div class="confidence-fill" id="confidence-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="result-grid" style="margin-top: 20px;">
                        <div class="result-item" style="grid-column: 1 / -1;">
                            <div class="result-label">Timestamp</div>
                            <div class="result-value" id="result-timestamp" style="font-size: 16px;">-</div>
                        </div>
                    </div>

                    <div class="result-footer">
                        <button class="btn btn-secondary" onclick="document.getElementById('analyzer-form').reset(); document.getElementById('result-section').classList.remove('loaded'); document.getElementById('result').style.display = 'none'; document.getElementById('empty-state').style.display = 'block'; resetCharCount();">Analyze Another</button>
                        <button class="btn btn-secondary" onclick="goToDashboard()">View Dashboard</button>
                    </div>

                    <div id="error" class="error" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analyzer-form');
        const commentInput = document.getElementById('comment-input');
        const charCount = document.getElementById('char-count');

        // Update character count
        commentInput.addEventListener('input', () => {
            charCount.textContent = commentInput.value.length;
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await analyzeComment();
        });

        async function analyzeComment() {
            const text = commentInput.value.trim();

            if (!text) {
                showError('Please enter a comment to analyze');
                return;
            }

            if (text.length < 2) {
                showError('Comment must be at least 2 characters long');
                return;
            }

            try {
                // Show loading state
                document.getElementById('loading').classList.add('show');
                document.getElementById('result').style.display = 'none';

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to analyze comment');
                }

                const result = await response.json();

                // Display result
                displayResult(result);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('result').style.display = 'block';
                document.getElementById('result-section').classList.add('loaded');

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
                document.getElementById('loading').classList.remove('show');
            }
        }

        function displayResult(result) {
            const isToxic = result.is_toxic;
            const badgeColor = result.badge_color;

            document.getElementById('result-original').textContent = result.original_text;
            document.getElementById('result-category').textContent = result.category;

            // Badge
            const badgeDiv = document.getElementById('result-badge');
            badgeDiv.innerHTML = `<div class="badge badge-${badgeColor}">${result.category}</div>`;

            // Status
            const statusDiv = document.getElementById('result-status');
            if (isToxic) {
                statusDiv.innerHTML = '<div class="status-badge status-toxic">🚨 TOXIC</div>';
            } else {
                statusDiv.innerHTML = '<div class="status-badge status-safe">✅ SAFE</div>';
            }

            // Scores
            const toxicityPercent = (result.toxicity_score * 100).toFixed(1);
            const confidencePercent = (result.confidence * 100).toFixed(1);

            document.getElementById('result-toxicity').textContent = `${toxicityPercent}%`;
            document.getElementById('toxicity-bar').style.width = `${toxicityPercent}%`;

            document.getElementById('result-confidence').textContent = `${confidencePercent}%`;
            document.getElementById('confidence-bar').style.width = `${confidencePercent}%`;

            // Timestamp
            const date = new Date(result.created_at);
            document.getElementById('result-timestamp').textContent = date.toLocaleString();

            // Clear error
            document.getElementById('error').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').classList.remove('show');
        }

        function resetCharCount() {
            charCount.textContent = '0';
        }

        function goToDashboard() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
